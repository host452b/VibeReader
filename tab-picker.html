<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Select Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap">
  <style>
    :root {
      --bg: #FAFAF9;
      --border: #E7E5E4;
      --tx: #1C1917;
      --tx-2: #57534E;
      --tx-3: #A8A29E;
      --accent: #292524;
      --green: #4D7C0F;
      --muted: #F5F5F4;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: var(--font);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--tx);
    }
    .header-actions { display: flex; gap: 6px; }
    .header-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--tx-2);
      font-family: var(--font);
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .header-btn:hover { border-color: var(--tx-3); color: var(--tx); }
    .tab-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-track { background: transparent; }
    .tab-list::-webkit-scrollbar-thumb { background: var(--tx-3); border-radius: 2px; }
    .tab-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .tab-item:hover { background: var(--muted); }
    .tab-item:last-child { border-bottom: none; }
    .tab-item input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }
    .tab-favicon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      object-fit: contain;
      border-radius: 2px;
    }
    .tab-info { flex: 1; min-width: 0; overflow: hidden; }
    .tab-title {
      font-size: 13px;
      color: var(--tx);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }
    .tab-url {
      font-size: 10px;
      color: var(--tx-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .tab-badge {
      font-size: 9px;
      font-weight: 500;
      color: var(--green);
      background: #F0FDF4;
      padding: 1px 6px;
      border-radius: 9999px;
      flex-shrink: 0;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      background: var(--muted);
      flex-shrink: 0;
    }
    .footer-count { font-size: 11px; color: var(--tx-3); }
    .footer-btns { display: flex; gap: 8px; }
    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--tx-2);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-cancel:hover { border-color: var(--tx-3); color: var(--tx); }
    .btn-load {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 16px;
      cursor: pointer;
      transition: opacity 0.12s;
    }
    .btn-load:hover { opacity: 0.85; }
    .btn-load:disabled { opacity: 0.3; cursor: not-allowed; }
    .empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--tx-3);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Select Pages</span>
    <div class="header-actions">
      <button class="header-btn" id="selectAll">All</button>
      <button class="header-btn" id="selectNone">None</button>
    </div>
  </div>
  <div class="tab-list" id="tabList"></div>
  <div class="footer">
    <span class="footer-count" id="count">0 selected</span>
    <div class="footer-btns">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-load" id="loadBtn" disabled>Load Selected</button>
    </div>
  </div>
  <script src="tab-picker.js"></script>
</body>
</html>
